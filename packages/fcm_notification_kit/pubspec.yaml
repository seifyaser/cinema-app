name: fcm_notification_kit
description: >
  Reusable internal package that provides the full Firebase Cloud Messaging
  notification infrastructure — permission handling, local notification
  display, foreground/background/terminated stream wiring, and backend
  device-token registration — ready to drop into any Flutter project.
version: 1.0.0
homepage: https://github.com/your-org/fcm_notification_kit

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_messaging: '>=14.0.0 <16.0.0'
  flutter_local_notifications: '>=17.0.0 <20.0.0'
  dartz: '>=0.10.0 <1.0.0'
  dio: '>=5.0.0 <6.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
